[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "quarry-cli"
version = "0.1.0"
description = "Minimal CLI invocation surface for Quarry"
requires-python = ">=3.10"
dependencies = [
    "quarry-core",
    "quarry-connectors",
    "quarry-operators",
    "quarry-registry",
]

[project.scripts]
quarry = "quarry_cli.main:main"

[tool.hatch.build.targets.wheel]
packages = ["src/quarry_cli"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
