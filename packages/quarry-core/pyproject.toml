[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "quarry-core"
version = "0.1.0"
description = "Canonical geospatial execution substrate — core contracts"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/quarry_core"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
