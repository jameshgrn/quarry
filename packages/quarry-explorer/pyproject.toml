[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "quarry-explorer"
version = "0.1.0"
description = "Visual inspection UI for Quarry connectors"
requires-python = ">=3.10"
dependencies = [
    "quarry-core",
    "quarry-connectors",
    "quarry-operators",
    "fastapi>=0.100.0",
    "uvicorn>=0.20.0",
    "rasterio>=1.3.0",
    "numpy>=1.24.0",
    "pillow>=10.0.0",
    "h5py>=3.8.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/quarry_explorer"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
