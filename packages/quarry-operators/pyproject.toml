[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "quarry-operators"
version = "0.1.0"
description = "Quarry operator implementations"
requires-python = ">=3.11"
dependencies = [
    "quarry-core",
    "rasterio>=1.3.0",
    "fiona>=1.9.0",
    "shapely>=2.1.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/quarry_operators"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
