[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "quarry-registry"
version = "0.1.0"
description = "DuckDB-backed artifact and run registry for Quarry"
requires-python = ">=3.10"
dependencies = [
    "quarry-core",
    "duckdb>=1.0.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/quarry_registry"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
