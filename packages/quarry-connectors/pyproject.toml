[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "quarry-connectors"
version = "0.1.0"
description = "Quarry connector implementations"
requires-python = ">=3.10"
dependencies = [
    "quarry-core",
    "rasterio>=1.3.0",
    "fiona>=1.9.0",
    "pystac-client>=0.7.0",
    "psycopg[binary]>=3.1.0",
    "shapely>=2.0.0",
    "duckdb>=1.0.0",
    "requests>=2.28.0",
]

[project.optional-dependencies]
geoparquet = ["pyarrow>=14.0.0"]
ogc = ["owslib>=0.29.0"]
netcdf = ["netCDF4>=1.6.0"]
hdf5 = ["h5py>=3.8.0"]
s3 = ["boto3>=1.28.0"]
gcs = ["google-cloud-storage>=2.10.0"]
all-connectors = [
    "pyarrow>=14.0.0",
    "owslib>=0.29.0",
    "netCDF4>=1.6.0",
    "h5py>=3.8.0",
    "boto3>=1.28.0",
    "google-cloud-storage>=2.10.0",
]
dev = ["pytest>=7.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/quarry_connectors"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
