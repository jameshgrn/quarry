[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "quarry-connectors"
version = "0.1.0"
description = "Quarry connector implementations"
requires-python = ">=3.10"
dependencies = [
    "quarry-core",
    "rasterio>=1.3.0",
    "fiona>=1.9.0",
    "pystac-client>=0.7.0",
    "psycopg[binary]>=3.1.0",
    "shapely>=2.0.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/quarry_connectors"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
