- HARD BOUNDARY: only `packages/quarry-connectors/src/quarry_connectors/topojson.py` may be MODIFIED. The test file `tests/pressure_test/test_topojson_connector.py` is in `files.read` ONLY â€” do not open it for editing, do not edit, do not delete. dgov diffs the final commit and any line change in a read-only file is a contract violation. The settlement gate runs the full pressure suite â€” trust it; do NOT run pytest yourself.

Edit:
