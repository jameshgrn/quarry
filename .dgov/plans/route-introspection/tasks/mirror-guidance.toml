[tasks.mirror-guidance]
summary = "Add GEMINI.md as a canonical pointer to AGENTS.md so dgov's policy-mirror gate passes."
prompt = """
Orient:
- Read `AGENTS.md` to confirm it is the canonical agent-facing guidance for this repo.
- The dgov `policy-mirror` preflight gate expects `GEMINI.md` to exist alongside `AGENTS.md` and `CLAUDE.md`.
- Verbatim copies drift; this repo prefers a pointer file. The pointer must (a) name AGENTS.md as the single source of truth and (b) include enough top-level context that an agent reading only GEMINI.md will redirect itself before doing anything.
- Do NOT copy AGENTS.md content into GEMINI.md. Do NOT modify AGENTS.md.
- This is the only file this task creates. No other edits.

Edit:
1. Create `GEMINI.md` at the repo root with the following exact structure:
   - H1 title: `# Gemini Guidance`
   - One paragraph: state that AGENTS.md is the canonical agent guidance for this repository and Gemini agents must read it before doing anything else. Include a relative-path link.
   - H2: `## Why this file exists`
   - One paragraph: explain that dgov's policy-mirror preflight gate requires CLAUDE.md, AGENTS.md, and GEMINI.md to coexist; this file is a deliberate pointer to avoid drift across mirrors.
   - H2: `## Canonical guidance`
   - A single bullet: link to `./AGENTS.md` with the label "Agent doctrine, lanes, debt list, behavior rules".
   - Keep total length under 25 lines. Plain markdown, no code fences, no emojis.

Verify:
- `test -f GEMINI.md && head -1 GEMINI.md` prints `# Gemini Guidance`.
- `grep -c 'AGENTS.md' GEMINI.md` is at least 2.
- `wc -l GEMINI.md` is at most 25.
- `dgov preflight` no longer reports `Missing guidance mirror(s): GEMINI.md` (other unrelated drift may remain).
"""
commit_message = "Add GEMINI.md pointer to AGENTS.md for dgov policy mirror"

files.create = ["GEMINI.md"]
files.read = ["AGENTS.md"]
