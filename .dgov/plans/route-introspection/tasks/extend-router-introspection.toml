[tasks.extend-router-introspection]
summary = "Expose extensions/schemes/prefixes filters on ConnectorRouter.registrations via a typed view dataclass."
prompt = """
Orient:
- Read `packages/quarry-core/src/quarry_core/router.py` end-to-end. Note the `_Registration` dataclass (private, has `extensions`, `schemes`, `prefixes` frozensets), the `registrations` property (currently returns `list[tuple[str, frozenset[SourceRefKind], int, bool]]`), and the `MatchReason` enum. Lane: registry.
- Read `tests/pressure_test/test_connector_router.py` lines 370–386 (`TestRegistrationIntrospection`). It accesses fields by tuple position (`r[0]` for name). Any change to the return shape must update this test.
- Constraint: `quarry-core` MUST remain zero-dependency. Use only stdlib (`dataclasses`, `typing`, `enum`, `collections.abc`).
- Constraint: do NOT change `_Registration` (private), the `register()` signature, the `select()`/`select_one()` behavior, or `MatchReason`. Behavioral surface is read-only introspection only.
- Constraint: keep `registrations` as a `@property` on `ConnectorRouter` (callers depend on attribute access).
- Lane declaration: registry (router introspection) + check (test update).
- HARD BOUNDARY: only `packages/quarry-core/src/quarry_core/router.py` and `tests/pressure_test/test_connector_router.py` may be MODIFIED. `tests/pressure_test/test_router_integration.py` and `tests/pressure_test/test_policy_surface.py` are claimed only to permit read access for self-verification — they MUST remain byte-identical to their HEAD state. dgov diffs your final commit; any line change in those two files is a contract violation. Do NOT touch any file outside the four-file claim list at all.
- HARD BOUNDARY: this repo runs Python 3.11+ (current interpreter is 3.11.6). `tomllib` is in the stdlib. Do NOT add a `tomli` fallback or any `try/except ModuleNotFoundError` import shim anywhere — there is no Python 3.10 path to support.

Edit:
1. In `packages/quarry-core/src/quarry_core/router.py`:
   a. Add a new public `@dataclass(frozen=True)` named `RegistrationView` near `ConnectorMatch`. Fields, in this order: `connector_name: str`, `kinds: frozenset[SourceRefKind]`, `priority: int`, `fallback: bool`, `extensions: frozenset[str]`, `schemes: frozenset[str]`, `prefixes: frozenset[str]`. Add a one-line docstring describing it as a public read-only view of a router registration.
   b. Update the `registrations` property's return annotation to `list[RegistrationView]` and update its docstring (one line) to describe the typed view.
   c. Replace the property body to construct `RegistrationView` instances from each `_Registration`, mapping `connector.name -> connector_name` and copying the other fields directly.
   d. Export `RegistrationView` from this module (it lives at module scope; no `__init__.py` re-export needed unless the file already had one — check before adding).
2. In `tests/pressure_test/test_connector_router.py`, `TestRegistrationIntrospection`:
   a. `test_registrations_property`: change tuple-index access (`r[0]`, etc.) to attribute access (`r.connector_name`). Keep the existing length assertion (4 registrations) and the four name-presence checks.
   b. `test_empty_router`: keep `assert router.registrations == []` — list equality on an empty list still works.
   c. Add ONE new test method `test_registrations_view_exposes_policy_surface` that:
      - builds a fresh `ConnectorRouter`,
      - calls `register(...)` once with a stub connector (reuse the existing test stub pattern in this file), `kinds={SourceRefKind.LOCAL_RASTER}`, `priority=3`, `extensions={".tif", ".tiff"}`, `schemes={"s3", "https"}`, `prefixes={"opentopo://"}`,
      - asserts the resulting `RegistrationView` has `priority == 3`, `extensions == frozenset({".tif", ".tiff"})`, `schemes == frozenset({"s3", "https"})`, `prefixes == frozenset({"opentopo://"})`, and `fallback is False`.

Verify:
- `uv run ruff check packages/quarry-core/src/quarry_core/router.py tests/pressure_test/test_connector_router.py`
- `uv run ruff format --check packages/quarry-core/src/quarry_core/router.py tests/pressure_test/test_connector_router.py`
- `PYTHONPATH=packages/quarry-core/src:packages/quarry-connectors/src:packages/quarry-operators/src:packages/quarry-registry/src:packages/quarry-cli/src uv run pytest tests/pressure_test/test_connector_router.py -q`
- The settlement gate runs the full pressure suite (`tests/pressure_test/` and `packages/quarry-connectors/tests/`) — do NOT run those yourself; trust the gate.
"""
commit_message = "quarry-core: type ConnectorRouter.registrations view"
self_review = true

files.edit = [
  "packages/quarry-core/src/quarry_core/router.py",
  "tests/pressure_test/test_connector_router.py",
