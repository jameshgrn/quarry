- `uv run ruff format --check packages/quarry-operators/src/quarry_operators/d8_flow_direction.py`
- Quick syntax / import sanity: `uv run python -c "from quarry_operators.d8_flow_direction import D8FlowDirectionOperator, D8FlowDirectionParams, _compute_d8, _steepest_descent_at, _assign_steepest_descent, _resolve_flat_pits, D8_DR, D8_DC, OUTLET, PIT, NODATA; print('ok')"`
- The settlement gate runs the full pressure suite — trust it; do NOT run pytest yourself. The existing tests in `tests/pressure_test/test_d8_flow_direction.py` (which import `_compute_d8` directly and exercise uniform slopes, diagonal weighting, boundary OUTLET, unfilled PIT, NODATA masking, cone radial flow, flat-surface resolution, and the FillDepressions->D8 chain) must pass with no source changes to the test file.
