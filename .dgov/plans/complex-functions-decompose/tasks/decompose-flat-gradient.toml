[tasks.decompose-flat-gradient]
summary = "Extract flat-cell detection, outlet seeding, and BFS distance helpers from _apply_flat_gradient. Pure refactor — no behavior change."
prompt = """
Orient:
- Read `packages/quarry-operators/src/quarry_operators/fill_depressions.py` end-to-end. The module-level function `_apply_flat_gradient(filled, valid, epsilon)` starts at line 359 and is 72 lines long. Sentrux flagged it as the top long-function offender (line_count=72, cyclomatic=29, cognitive=63). It runs four phases inline: (1) detect flat cells via per-cell D8 neighbor scan excluding boundary, (2) seed a BFS queue with flat cells that touch a non-flat valid neighbor (outlets), (3) BFS-propagate integer distance from outlet edge across flat regions, (4) add `dist * epsilon` to filled elevations where `dist >= 0`.
- Lane: operator (refactor only). One logical commit.
- Doctrine: this is a strict refactor of an internal private helper. No public behavior change. The existing pressure tests in `tests/pressure_test/test_fill_depressions.py` must keep passing without modification — including `TestFlatGradient.test_gradient_creates_slope_in_flat` and `test_gradient_disabled_keeps_flat`, plus all `TestPriorityFlood`, `TestExecution`, and `TestEdgeCases` cases. The test file imports `FillDepressionsOperator`, `FillDepressionsParams`, `_count_interior_pits`, and `_priority_flood` — those names must remain importable from the module.
- The codebase already documents in scheduled debt: "Flat gradient uses naive BFS — Barnes et al. (2015) optimal flat resolution deferred". This task is NOT about replacing the algorithm; it is about making the existing algorithm readable. Do NOT change BFS semantics, neighbor offsets, distance integer type, the `dist >= 0` mask, the `epsilon` multiplication, or the boundary-cell skip.
- HARD BOUNDARY: only `packages/quarry-operators/src/quarry_operators/fill_depressions.py` may be MODIFIED. The test file `tests/pressure_test/test_fill_depressions.py` is in `files.read` ONLY — it must remain byte-identical to HEAD. dgov diffs the final commit; any line change in a read-only file is a contract violation. The settlement gate runs the full pressure suite — trust it; do NOT run pytest yourself.

Edit:
1. In `packages/quarry-operators/src/quarry_operators/fill_depressions.py`, refactor `_apply_flat_gradient(filled, valid, epsilon)` so it becomes orchestration only (target: under ~25 lines) by extracting these private module-level helpers, placed BEFORE `_apply_flat_gradient` in the "Flat gradient resolution" section:
   a. `_identify_flat_cells(filled: np.ndarray, valid: np.ndarray) -> np.ndarray` — returns a `bool` array of shape `filled.shape`. Encapsulates the existing nested loop over `range(1, nrows - 1)` × `range(1, ncols - 1)` that flags valid interior cells with no strictly-lower valid D8 neighbor. Preserve the existing boundary skip semantics exactly (the outer `range(1, n-1)` bounds AND the inner `if r == 0 or r == nrows - 1 or c == 0 or c == ncols - 1: continue` guard — keep both even though the outer range already excludes them; do NOT "simplify" this).
   b. `_seed_flat_outlets(flat: np.ndarray, valid: np.ndarray) -> tuple[np.ndarray, collections.deque[tuple[int, int]]]` — returns `(dist, queue)` where `dist` is an `np.int32` array initialized to `-1` with outlet flat cells set to `0`, and `queue` is a `collections.deque` pre-populated with those outlet `(r, c)` tuples. An outlet flat cell is a flat cell that has at least one valid non-flat D8 neighbor. Move the `from collections import deque` import to a top-of-module import.
   c. `_propagate_flat_distance(flat: np.ndarray, dist: np.ndarray, queue: collections.deque[tuple[int, int]]) -> None` — performs the BFS in place on `dist`, assigning `dist[neighbor] = dist[current] + 1` for flat neighbors with `dist == -1`. Returns `None` (mutates `dist`). Preserve neighbor-offset iteration over `_D8_DR`/`_D8_DC` exactly.
2. The refactored `_apply_flat_gradient` becomes: copy `filled` into `gradient`, call `_identify_flat_cells`, early-return `gradient` if no flat cells, call `_seed_flat_outlets`, call `_propagate_flat_distance`, apply `gradient[dist >= 0] += dist[dist >= 0].astype(np.float64) * epsilon`, return `gradient`.
3. Type hints required on every new helper, including `np.ndarray` for arrays. Add a one-line docstring to each helper describing its phase.
4. Move `from collections import deque` from inside `_apply_flat_gradient` to the module-level imports block (alphabetically near the top with the other stdlib imports). Do not leave the inline import.
5. Do NOT change: `FillDepressionsParams`, `FillDepressionsOperator` (any method), `_priority_flood`, `_count_interior_pits`, `_D8_DR`, `_D8_DC`, the public signature of `_apply_flat_gradient`, the `OperatorSpec`, the `declared_checks` list, or the `_run_checks` body.
6. Do NOT add new validation, new params fields, new checks, vectorization, numba, scipy.ndimage, or any "while you're here" cleanup. Do NOT replace the BFS with anything else. Do NOT change the boundary-skip semantics described in step 1a.

Verify:
- `uv run ruff check packages/quarry-operators/src/quarry_operators/fill_depressions.py`
- `uv run ruff format --check packages/quarry-operators/src/quarry_operators/fill_depressions.py`
- Quick syntax check: `uv run python -c "from quarry_operators.fill_depressions import FillDepressionsOperator, FillDepressionsParams, _priority_flood, _count_interior_pits, _apply_flat_gradient, _identify_flat_cells, _seed_flat_outlets, _propagate_flat_distance; print('ok')"`
- The settlement gate runs the full pressure suite — trust it; do NOT run pytest yourself.
"""
commit_message = "quarry-operators: extract flat-gradient helpers"
self_review = true

files.edit = ["packages/quarry-operators/src/quarry_operators/fill_depressions.py"]
files.read = ["tests/pressure_test/test_fill_depressions.py"]
