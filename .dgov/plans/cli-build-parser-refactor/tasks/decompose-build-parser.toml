   - `_add_run_subparser(subparsers)` — handles the `run` family: hydrology, zonal, sample, rasterize, AND the generic dispatch loop over `OPERATOR_NAMES` at the end.
2. Each helper must reproduce the existing subparser construction byte-identically: same arg names, same defaults, same help strings, same `set_defaults(func=...)` wiring, same `dest=...` choices.
3. After extraction, `build_parser()` should:
   - Build the top-level `parser` with `argparse.ArgumentParser(...)`, the existing `--workspace` and `--json` (`dest="json_output"`) flags, the existing description.
