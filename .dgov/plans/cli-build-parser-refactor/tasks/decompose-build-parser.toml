5. Do NOT change:
   - The order or names of subcommands.
   - Any flag name, default, type, help, or destination.
   - The `cmd_*` handler functions or their signatures.
   - The `OPERATOR_NAMES` import location or usage.
   - The `main()` function or `if __name__ == "__main__":` block.
6. Do NOT add new arguments, new helpers beyond the six listed, or any "while you're here" cleanup.

