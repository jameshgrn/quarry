- Read `packages/quarry-cli/src/quarry_cli/main.py` end-to-end. The `build_parser()` function is around line 1284 (183 lines), containing the top-level parser, the `--workspace` and `--json` global flags, and inline subparser construction for: `artifacts list`, `artifacts show`, `lineage`, `runs list`, `runs show`, `checks show`, `route`, and the `run` family (`run hydrology`, `run zonal`, `run sample`, `run rasterize`, plus the generic `run <op>` dispatch loop).
- Lane: adapter (refactor only). One logical commit.
- Doctrine: this is a strict refactor. The CLI surface — every flag, every subcommand, every help string — must be byte-identical. The 19 existing CLI pressure tests across `test_cli_zonal.py`, `test_cli_sample.py`, `test_cli_rasterize.py`, `test_cli_inspection.py`, `test_cli_route.py`, `test_cli_json.py` must keep passing without modification.
- HARD BOUNDARY: only `packages/quarry-cli/src/quarry_cli/main.py` may be MODIFIED. Do NOT touch any test file, any other package source, or any doc. The settlement gate runs the full pressure suite — trust it.

Edit:
1. In `packages/quarry-cli/src/quarry_cli/main.py`, decompose `build_parser()` into six private helper functions, each taking the top-level `subparsers` action object (returned by `parser.add_subparsers(...)`) and adding the relevant subparser tree:
   - `_add_artifacts_subparser(subparsers)` — handles `artifacts list` and `artifacts show`.
   - `_add_lineage_subparser(subparsers)` — handles `lineage`.
   - `_add_runs_subparser(subparsers)` — handles `runs list` and `runs show`.
   - `_add_checks_subparser(subparsers)` — handles `checks show`.
