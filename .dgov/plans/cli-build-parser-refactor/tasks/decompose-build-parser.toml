- `uv run ruff check packages/quarry-cli/src/quarry_cli/main.py`
- `uv run ruff format --check packages/quarry-cli/src/quarry_cli/main.py`
- `uv run python -c "from quarry_cli.main import build_parser; p = build_parser(); print(sorted(p._actions[1].choices.keys()))"` should print exactly `['artifacts', 'checks', 'lineage', 'route', 'run', 'runs']` (or whatever exact set existed pre-refactor — match HEAD).
