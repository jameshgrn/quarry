[tasks.nested-params-encoder]
summary = "Replace default=str JSON fallback with a custom encoder that emits MappingProxyType (and other Mapping types) as nested dicts."
prompt = """
Orient:
- Read `packages/quarry-cli/src/quarry_cli/main.py`. The `_emit_json(data)` helper currently calls `json.dumps(data, default=str, sort_keys=True)`. The `default=str` callback stringifies any non-JSON-native object via `str()`, which for `types.MappingProxyType` (the frozen mapping returned by `SourceRef.params`) produces a Python repr like `"{'scheme': 's3', 'url': 's3://bucket/dem.tif'}"` instead of a nested JSON object.
- Read `tests/pressure_test/test_cli_json.py` to learn the existing route-JSON test pattern: `test_route_json_emits_parseable_object` parses the JSON output and asserts top-level keys; nothing currently asserts on the `params` field shape.
- Lane: adapter (small fix) + check (one new assertion). One logical commit.
- Doctrine: strict expansion. All existing CLI tests AND the 5 existing JSON tests must keep passing without modification. The new behavior only changes the rendered shape of mapping-typed fields inside the JSON output — exit codes, stderr, and text-mode output are unchanged.
- HARD BOUNDARY: only `packages/quarry-cli/src/quarry_cli/main.py` and `tests/pressure_test/test_cli_json.py` may be MODIFIED. Do NOT touch any other file. Settlement runs the full pressure suite.

Edit:
1. In `packages/quarry-cli/src/quarry_cli/main.py`:
   a. Add `from collections.abc import Mapping` to the imports (or extend an existing collections-related import line).
   b. Add `from types import MappingProxyType` to the imports.
   c. Replace the body of `_emit_json` with a custom encoder. Two options — pick (i) for simplicity:
      (i) A small `_json_default(obj)` function at module level that handles `MappingProxyType` (and any `Mapping` ABC instance that isn't already a `dict`) by returning `dict(obj)`; falls back to `str(obj)` for anything else (preserving the existing datetime/path behavior). Pass it as `default=_json_default` to `json.dumps`.
      (ii) A `class _QuarryJSONEncoder(json.JSONEncoder)` with `default()` doing the same thing; pass `cls=_QuarryJSONEncoder` to `json.dumps`.
      Use option (i) — single small function, no class machinery.
   d. The `_emit_json` call signature is unchanged. Keep `sort_keys=True` so output remains stable for tests.
   e. The `default` fallback to `str(obj)` MUST remain for the non-Mapping case so existing tests that rely on datetime/path stringification keep passing.
2. In `tests/pressure_test/test_cli_json.py`:
   a. Inside the existing `test_route_json_emits_parseable_object` test (or as a new test method `test_route_json_params_is_nested_object` — pick the cleaner option), add an assertion: parse the route JSON output for `s3://bucket/dem.tif`, assert `data["source"]["params"]` is an instance of `dict` (NOT `str`), and assert `data["source"]["params"]["scheme"] == "s3"`. This is the minimum change.
   b. Do not modify any other test in the file.

Verify:
- `uv run ruff check packages/quarry-cli/src/quarry_cli/main.py tests/pressure_test/test_cli_json.py`
- `uv run ruff format --check packages/quarry-cli/src/quarry_cli/main.py tests/pressure_test/test_cli_json.py`
- `PYTHONPATH=packages/quarry-core/src:packages/quarry-connectors/src:packages/quarry-operators/src:packages/quarry-registry/src:packages/quarry-cli/src uv run pytest tests/pressure_test/test_cli_json.py -v`
- The settlement gate runs the full pressure suite — trust it.
"""
commit_message = "quarry-cli: emit nested JSON for MappingProxyType in --json mode"
self_review = true

files.edit = [
  "packages/quarry-cli/src/quarry_cli/main.py",
  "tests/pressure_test/test_cli_json.py",
]
