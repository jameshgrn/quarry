[tasks.add-predicates]
summary = "Extend SpatialJoinOperator to support contains, within, and touches predicates alongside intersects, with paired pressure tests."
prompt = """
Orient:
- Read `packages/quarry-operators/src/quarry_operators/spatial_join.py` end-to-end. Note the `predicate: str = \"intersects\"` field on `SpatialJoinParams`, the validation block at lines ~101-102 that rejects anything other than `\"intersects\"`, the `prep(left_geom)` call that returns a `shapely.prepared.PreparedGeometry`, and the `prepared.intersects(right_geom)` call inside the inner loop.
- Read `tests/pressure_test/test_spatial_join.py` to understand the existing fixture pattern: shared `op` and `workspace` fixtures, `_write_vector(path, geometries, properties=...)` helper, `_make_vector_artifact(path)` helper, flat `def test_*` functions, all in CRS EPSG:32610. The existing test `test_unsupported_predicate_rejected` (around line 457) currently uses `predicate=\"contains\"` as its example of an unsupported predicate â€” that example becomes valid under this change and must be replaced.
- Lane: operator (semantic expansion) + check (paired tests). Single logical commit.
- Doctrine: this is a strict expansion. The default predicate stays `\"intersects\"` (existing call sites unaffected). Existing test cardinality and lineage assertions must keep passing â€” do NOT change the join semantics for `intersects`.
- HARD BOUNDARY: only `packages/quarry-operators/src/quarry_operators/spatial_join.py` and `tests/pressure_test/test_spatial_join.py` may be touched (read or write) by your tools. Do NOT open any other file. The settlement gate runs the full pressure suite â€” trust it.
- Reference (do not open these files; rely on stdlib/shapely knowledge):
  - shapely's `prepared.PreparedGeometry` exposes `intersects`, `contains`, `within`, `touches` directly (plus `crosses`, `disjoint`, `overlaps`, `covers`, `covered_by`); the four we are adding are the same names callers will pass as the predicate string.
  - `intersects` and `touches` are symmetric. `contains` and `within` are directional and reflexive opposites: `A.contains(B)` âźş `B.within(A)`. Apply each predicate with `prepared` (left) as the receiver and `right_geom` as the argument; that mirrors how `intersects` is called today.

Edit:
1. In `packages/quarry-operators/src/quarry_operators/spatial_join.py`:
   a. Update the module docstring on line 6 from `Predicate: intersects (v1)` to `Predicates: intersects, contains, within, touches`.
   b. Add a private module-level constant `_SUPPORTED_PREDICATES: frozenset[str] = frozenset({\"intersects\", \"contains\", \"within\", \"touches\"})` near the top of the module (after imports, before the dataclass).
   c. Replace the validation block currently at lines ~101-102:
      ```python
      if params.predicate != \"intersects\":
          errors.append(f\"Unsupported predicate: {params.predicate} (v1 supports: intersects)\")
      ```
      with:
      ```python
      if params.predicate not in _SUPPORTED_PREDICATES:
          errors.append(
              f\"Unsupported predicate: {params.predicate!r} \"
              f\"(supported: {', '.join(sorted(_SUPPORTED_PREDICATES))})\"
          )
      ```
   d. In `execute()`, replace the single `if prepared.intersects(right_geom):` line (around line 185) with a dispatch on `params.predicate`. Use `getattr(prepared, params.predicate)(right_geom)` â€” clean, single-line, no branching tower; the predicate string was already validated by `validate_inputs`. Keep the surrounding control flow (`matches.append(right_props)`, the `if not matches:` else branch) byte-identical.
   e. Update the `SpatialJoinOperator` class docstring (around line 46) where it says `Input 1: right vector (attributes joined where predicate holds)` â€” leave that line as-is; just confirm the wording still applies to all four predicates (it does).
   f. Update `SpatialJoinParams.predicate` field comment (if any). The default stays `\"intersects\"`. Add a one-line docstring on the dataclass field describing the four supported values, e.g. by adding a `# One of: intersects, contains, within, touches` comment on or above the line.
2. In `tests/pressure_test/test_spatial_join.py`:
   a. Update the module docstring (lines 1-20). Replace the existing line `12. Validation rejects unsupported predicate` with `12. Validation rejects invalid predicate (intersects/contains/within/touches accepted)`. Add four new bullets to the stress-points list:
      `15. predicate=contains â€” left polygon containing right point matches`
      `16. predicate=within â€” left polygon contained in right polygon matches`
      `17. predicate=touches â€” boundary-only contact matches; interior overlap does not`
      `18. predicate asymmetry â€” same geometry pair with contains vs within yields different match counts`
   b. Rename the existing `test_unsupported_predicate_rejected` function to `test_invalid_predicate_rejected`. Inside, change the param `predicate=\"contains\"` to `predicate=\"crosses\"` (a real shapely predicate that this operator does NOT expose â€” the assertion still finds `\"Unsupported predicate\"` in errors).
   c. Add four new `def test_*` functions at the end of the file, each using the existing `op`, `workspace`, `_write_vector`, and `_make_vector_artifact` helpers and EPSG:32610 CRS:
      - `test_predicate_contains`: left layer = single polygon (a 100m square at origin); right layer = single point at (50, 50) inside the polygon. With `predicate=\"contains\"`, output must have exactly 1 feature with the right point's attribute carried over.
      - `test_predicate_within`: left layer = single small polygon (10m square at (45, 45)); right layer = single large polygon (100m square at origin) that fully contains the left. With `predicate=\"within\"`, output must have exactly 1 feature with the right polygon's attribute carried over.
      - `test_predicate_touches`: left layer = polygon from (0,0) to (10,10); right layer = polygon from (10,0) to (20,10) (sharing the x=10 edge). With `predicate=\"touches\"`, output must have exactly 1 feature. Then a sibling assertion: with `predicate=\"intersects\"` on the same pair, also 1 feature; with `predicate=\"contains\"` on the same pair, the left feature is preserved but with NULL right attributes (left join invariant â€” touching does not satisfy contains).
      - `test_predicate_asymmetry_contains_within`: left = small polygon (10m square at (45,45)); right = large polygon (100m square at origin). Run twice on the same inputs with `predicate=\"contains\"` then `predicate=\"within\"`. The contains run produces 1 feature with NULL right attrs (small does not contain large). The within run produces 1 feature with the large polygon's attribute carried over. Assert the two results differ in whether the right attribute is None.
   d. Each new test must call `_make_vector_artifact(path)` for both inputs, build `SpatialJoinParams(output_path=str(workspace / \"out.geojson\"), predicate=...)`, call `op.execute([left, right], params)`, then read the output GeoJSON via `fiona.open` and count features / inspect properties to assert the expected outcomes.

Verify:
- `uv run ruff check packages/quarry-operators/src/quarry_operators/spatial_join.py tests/pressure_test/test_spatial_join.py`
- `uv run ruff format --check packages/quarry-operators/src/quarry_operators/spatial_join.py tests/pressure_test/test_spatial_join.py`
- `PYTHONPATH=packages/quarry-core/src:packages/quarry-connectors/src:packages/quarry-operators/src:packages/quarry-registry/src:packages/quarry-cli/src uv run pytest tests/pressure_test/test_spatial_join.py -v`
- The settlement gate runs the full pressure suite â€” do NOT run other test files yourself; trust the gate.
"""
commit_message = "quarry-operators: add contains/within/touches to SpatialJoin"
self_review = true

files.edit = [
  "packages/quarry-operators/src/quarry_operators/spatial_join.py",
  "tests/pressure_test/test_spatial_join.py",
]
