       Top-level spatial duplicate keys (`crs`, `extent`, `bounds`, `resolution`, `feature_count`, `band_count`) and temporal-namespace keys (`temporal_start`, `temporal_end`, `temporal_resolution`, `temporal_observation_count`) are stripped at `Artifact` construction.

