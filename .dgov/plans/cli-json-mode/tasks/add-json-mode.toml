[tasks.add-json-mode]
summary = "Add a top-level --json flag to the quarry CLI: read-only and run subcommands emit machine-readable JSON when set, suppressing human-readable text and progress output."
prompt = """
Orient:
- Read `packages/quarry-cli/src/quarry_cli/main.py` end-to-end. The CLI uses argparse with one top-level parser, multiple subparsers (`artifacts`, `lineage`, `runs`, `checks`, `run`, `route`) and nested action subparsers. Each command is a `def cmd_<name>(args) -> int` function. The `_materialize_cli_source(router, raw, workspace, *, label)` helper prints `Materializing {label.lower()}: {source_ref.raw}` to stdout. Run commands also print `Completed: ...` and similar progress lines to stdout; errors already go to stderr.
- The 12 subcommand handlers in scope: `cmd_artifacts_list`, `cmd_artifacts_show`, `cmd_lineage`, `cmd_runs_list`, `cmd_runs_show`, `cmd_checks_show`, `cmd_route`, `cmd_run_hydrology`, `cmd_run_zonal`, `cmd_run_sample`, `cmd_run_rasterize`, `cmd_run_generic`.
- Read `tests/pressure_test/test_cli_zonal.py` for the canonical CLI test pattern: subprocess-free invocation via `from quarry_cli.main import main`, `main([...])`, capture via `capsys.readouterr()`. Tests use `capsys.readouterr().out` for stdout, `.err` for stderr.
- Lane: adapter (CLI surface expansion) + check (paired tests). Single logical commit.
- Doctrine: `--json` is a strict expansion. The default behavior (no `--json`) must remain byte-identical for stdout, stderr, and exit codes â€” every existing CLI test must keep passing without modification.
- HARD BOUNDARY: only `packages/quarry-cli/src/quarry_cli/main.py` may be MODIFIED. `tests/pressure_test/test_cli_zonal.py` is claimed read-only â€” it MUST remain byte-identical to its HEAD state. dgov diffs your final commit; any line change in the existing CLI test files is a contract violation. The new test file (`tests/pressure_test/test_cli_json.py`) is being CREATED. Do NOT touch any other file via your tools â€” settlement runs the full pressure suite.

Edit:
1. In `packages/quarry-cli/src/quarry_cli/main.py`:
   a. Add `import json` to the existing import block at the top of the file.
   b. In `build_parser()`, before any subparsers are added, add a top-level mutually-non-exclusive flag:
      ```python
      parser.add_argument("--json", action="store_true", dest="json_output", help="Emit machine-readable JSON instead of human text")
      ```
      Use `dest="json_output"` so the attribute does not shadow the `json` module.
   c. Update the `_materialize_cli_source(router, raw, workspace, *, label)` helper signature to add a keyword-only `quiet: bool = False` parameter. When `quiet` is True, do NOT print the `Materializing {label.lower()}: ...` line. Existing behavior with `quiet=False` (default) is unchanged.
   d. Add a small private helper at module level (after `_require_run_output`):
      ```python
      def _emit_json(data) -> None:
          \"\"\"Print one JSON object to stdout. Used when args.json_output is True.\"\"\"
          print(json.dumps(data, default=str, sort_keys=True))
      ```
      Use `default=str` so datetimes, paths, and frozensets serialize predictably; use `sort_keys=True` for stable output.
2. Refactor each of the 12 subcommand handlers in `packages/quarry-cli/src/quarry_cli/main.py` to support JSON mode. The pattern for read-only commands (`cmd_artifacts_list`, `cmd_artifacts_show`, `cmd_lineage`, `cmd_runs_list`, `cmd_runs_show`, `cmd_checks_show`, `cmd_route`):
   - Compute the data the same way you do now.
   - If `args.json_output` is True: call `_emit_json(data)` with a serializable dict/list, then return the same exit code.
   - If False: keep existing text rendering byte-identical.
   The pattern for run commands (`cmd_run_hydrology`, `cmd_run_zonal`, `cmd_run_sample`, `cmd_run_rasterize`, `cmd_run_generic`):
   - Pass `quiet=args.json_output` to every `_materialize_cli_source(...)` call.
   - When `args.json_output` is True: suppress all mid-run stdout prints (e.g., `print(f"\\nCompleted (...)")`, the per-output `print(f"  {output.name:<25} â†’ {uri}")` lines, etc.). Replace the final summary block with a single `_emit_json(...)` call carrying: `operator_name`, `status` (`"completed"` / `"failed"`), `run_id`, `output` dict (with `name`, `uri`, `artifact_id`), `checks` summary (counts: `valid`, `invalid`, `warning` if applicable), and (on failure) `error` field.
   - On error paths: keep error messages going to stderr. Do NOT route stderr to JSON. The exit code remains the source of truth for failure; stderr remains human-readable text.
3. JSON shape per subcommand (build the data this way; no envelope, just the data structure):
   - `cmd_artifacts_list`: list of artifact dicts: `{"id": ..., "name": ..., "type": ..., "uri": ..., "created_at": ...}`
   - `cmd_artifacts_show`: one dict: `{"id", "name", "type", "uri", "size_bytes", "content_hash", "spatial": {...}, "metadata": {...}, "lineage": {...}}`
   - `cmd_runs_list`: list of run dicts: `{"id", "operator_name", "status", "started_at", "completed_at"}`
   - `cmd_runs_show`: one dict: `{"id", "operator_name", "status", "started_at", "completed_at", "params", "input_ids", "output_id", "error"}`
   - `cmd_checks_show`: list of check dicts: `{"check_name", "state", "message", "metadata"}`
   - `cmd_lineage`: list of lineage entries (one per ancestor) or a tree dict â€” pick the simpler list representation: `[{"artifact_id", "operator", "depth"}]`.
   - `cmd_route`: dict: `{"source": {"raw", "kind", "params"}, "matches": [{"connector_name", "reason", "rank", "kinds", "extensions", "schemes", "prefixes"}], "selected": connector_name | null}`
   - `cmd_run_*` commands: dict as described above (operator_name, status, run_id, output, checks, error).
   These shapes are illustrative â€” use the actual field names available on the underlying `Artifact`, `RunRecord`, `CheckResult`, `ConnectorMatch`, etc. The key invariant: a JSON-mode invocation must emit ONE valid JSON document on stdout (single line, no preamble) and nothing else.
4. Create `tests/pressure_test/test_cli_json.py` with a docstring matching the style of `test_cli_zonal.py`. Required tests (each as a `def test_*` function; mirror existing helpers â€” the new file can be standalone, no need to import from `test_cli_zonal.py`):
   a. `test_route_json_emits_parseable_object` â€” invoke `main(["--json", "route", "/tmp/x.tif"])`, capture stdout, `json.loads()` it, assert keys `source`, `matches`, `selected` exist; assert `source["kind"] == "local_raster"`; assert `selected == "cog"`.
   b. `test_route_json_no_match_emits_empty_matches` â€” invoke with a `mailto:foo@bar.com` source; parse JSON; assert `matches == []` and `selected is None`; assert exit code is `2`.
   c. `test_artifacts_list_json_empty_workspace` â€” fresh `tmp_path` workspace, invoke `main(["--json", "artifacts", "list", "--workspace", str(tmp_path)])`, parse JSON; assert it is a list (length 0).
   d. `test_run_json_suppresses_progress_lines` â€” set up a tiny synthetic raster and zones GeoPackage in tmp_path (use the same `_write_raster` / `_write_polygon_zones` patterns common in the existing test_cli_*.py files; you may inline the helpers since you cannot edit those files). Run `main(["--json", "run", "zonal", "--raster", ..., "--zones", ..., "--workspace", str(workspace)])`. Capture stdout; assert that stdout contains exactly one line, that the line is valid JSON, that `data["operator_name"] == "zonal_stats"`, `data["status"] == "completed"`, and that `"Materializing"` is NOT in stdout (the progress prints were suppressed by `quiet=True`).
   e. `test_default_text_mode_unchanged` â€” invoke `main(["route", "/tmp/x.tif"])` (no `--json`), capture stdout; assert it contains the text-mode header line `Source` and does NOT contain a JSON object (no leading `{`). This guards backward compat.
   - Use `from quarry_cli.main import main` and invoke synchronously. Use pytest's `capsys` for stdout/stderr capture.
   - Do not require a Registry where avoidable; the route tests need none. The `cmd_run_zonal` test needs the standard registry setup pattern (workspace dir; the registry is created inside the command); follow the same pattern as `test_cli_zonal.py`'s end-to-end test.

Verify:
- `uv run ruff check packages/quarry-cli/src/quarry_cli/main.py tests/pressure_test/test_cli_json.py`
- `uv run ruff format --check packages/quarry-cli/src/quarry_cli/main.py tests/pressure_test/test_cli_json.py`
- `PYTHONPATH=packages/quarry-core/src:packages/quarry-connectors/src:packages/quarry-operators/src:packages/quarry-registry/src:packages/quarry-cli/src uv run pytest tests/pressure_test/test_cli_json.py -v`
- The settlement gate runs the full pressure suite â€” do NOT run other test files yourself; trust the gate. The existing CLI tests (test_cli_zonal, test_cli_sample, etc.) MUST keep passing without modification.
"""
commit_message = "quarry-cli: add --json mode to all subcommands"
self_review = true

files.edit = [
  "packages/quarry-cli/src/quarry_cli/main.py",
  "tests/pressure_test/test_cli_zonal.py",
]
files.create = ["tests/pressure_test/test_cli_json.py"]
