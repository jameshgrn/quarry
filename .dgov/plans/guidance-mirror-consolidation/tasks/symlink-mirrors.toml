[tasks.symlink-mirrors]
summary = "Replace CLAUDE.md and GEMINI.md with symlinks to AGENTS.md so the policy-mirror gate stays satisfied automatically."
prompt = """
Orient:
- Read `AGENTS.md` to confirm the unified canonical guidance is in place (the prior task `unify-canonical-guidance` produced it). Do NOT modify it here.
- Background: dgov's `policy_drift._guidance_file_drift` reads each of AGENTS.md, CLAUDE.md, GEMINI.md via `Path.read_text()` and requires byte-identical content with AGENTS.md as the canonical first entry. `read_text()` follows symlinks, so a symlink target = AGENTS.md is a valid mirror with zero ongoing drift.
- Lane: governance. Single logical commit.
- HARD BOUNDARY: only `CLAUDE.md` and `GEMINI.md` may be replaced. `AGENTS.md` is claimed read-only — it MUST remain byte-identical to its HEAD state. dgov diffs your final commit; any line change in AGENTS.md is a contract violation. Do NOT touch any other file via your tools.

Edit:
1. Delete the existing `CLAUDE.md` regular file: `rm CLAUDE.md`.
2. Delete the existing `GEMINI.md` regular file: `rm GEMINI.md`.
3. Create `CLAUDE.md` as a relative symlink pointing to `AGENTS.md`: `ln -s AGENTS.md CLAUDE.md`.
4. Create `GEMINI.md` as a relative symlink pointing to `AGENTS.md`: `ln -s AGENTS.md GEMINI.md`.
5. Stage the changes for git so the commit captures the symlink replacements.

Verify:
Run each command via bash; all must produce the indicated output.

- `test -L CLAUDE.md && echo OK` prints `OK` (CLAUDE.md is a symlink).
- `test -L GEMINI.md && echo OK` prints `OK` (GEMINI.md is a symlink).
- `readlink CLAUDE.md` prints exactly `AGENTS.md`.
- `readlink GEMINI.md` prints exactly `AGENTS.md`.
- `cmp AGENTS.md CLAUDE.md && echo MATCH` prints `MATCH`.
- `cmp AGENTS.md GEMINI.md && echo MATCH` prints `MATCH`.
- `dgov preflight` reports no `Missing guidance mirror(s)` and no `Guidance mirror drift` (other unrelated drift may remain, but neither of those two strings).
- The settlement gate runs the full pressure suite — trust it; do NOT run pytest yourself.
"""
commit_message = "Symlink CLAUDE.md and GEMINI.md to canonical AGENTS.md"
self_review = true
depends_on = ["tasks/unify-canonical-guidance.unify-canonical-guidance"]

files.delete = ["CLAUDE.md", "GEMINI.md"]
files.create = ["CLAUDE.md", "GEMINI.md"]
files.edit = ["AGENTS.md"]
