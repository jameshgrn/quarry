[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
quarry-core = { workspace = true }
quarry-connectors = { workspace = true }
quarry-operators = { workspace = true }
quarry-registry = { workspace = true }
quarry-cli = { workspace = true }

[dependency-groups]
dev = [
    "h5py>=3.8.0",
    "laspy>=2.0.0",
    "matplotlib>=3.10.8",
    "netcdf4>=1.7.3",
    "openpyxl>=3.1.5",
    "pillow>=12.2.0",
    "pyarrow>=14.0.0",
    "pytest>=7.0.0",
    "pytz>=2024.1",
]
